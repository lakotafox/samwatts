<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Media Picker — samwatts</title>
<style>
  :root {
    --bg:#0f1117; --panel:#1a1d27; --panel-2:#222634; --border:#2a2f3e;
    --ink:#e6e6ea; --ink-soft:#9aa0b4; --accent:#e6a33a;
    --hero:#ff6b4a; --gallery:#4ab9ff; --news:#6ae16a; --skip:#8b92a5;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font:14px/1.5 -apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:var(--bg);color:var(--ink)}
  a{color:var(--accent);text-decoration:none}

  /* header */
  header{position:sticky;top:0;z-index:10;background:rgba(15,17,23,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:.75rem 1rem;display:flex;flex-wrap:wrap;gap:.6rem;align-items:center}
  header h1{font-size:.95rem;font-weight:700;letter-spacing:.02em;margin-right:.5rem}
  header h1 span{color:var(--ink-soft);font-weight:400;margin-left:.4rem}
  .sep{width:1px;height:22px;background:var(--border)}
  .btn,.chip{background:var(--panel);color:var(--ink);border:1px solid var(--border);padding:.42rem .75rem;border-radius:5px;cursor:pointer;font:inherit;font-size:.85rem;transition:.15s}
  .btn:hover,.chip:hover{background:var(--panel-2);border-color:#3b415a}
  .btn.active,.chip.active{background:var(--accent);color:#1a1306;border-color:var(--accent)}
  input[type=text]{background:var(--panel);color:var(--ink);border:1px solid var(--border);padding:.42rem .7rem;border-radius:5px;font:inherit;font-size:.85rem;min-width:200px}
  input[type=text]:focus{outline:none;border-color:var(--accent)}
  .counter{color:var(--ink-soft);font-size:.82rem;margin-left:auto}
  .counter strong{color:var(--ink)}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:baseline}
  .dot.hero{background:var(--hero)} .dot.gallery{background:var(--gallery)} .dot.news{background:var(--news)} .dot.skip{background:var(--skip)}

  /* grid */
  main{padding:1rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.85rem;max-width:1600px;margin:0 auto}
  .card{position:relative;background:var(--panel);border:2px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;aspect-ratio:4/5;display:flex;flex-direction:column;transition:border-color .15s, transform .15s}
  .card:hover{transform:translateY(-2px);border-color:#3b415a}
  .card[data-cat=hero]{border-color:var(--hero)}
  .card[data-cat=gallery]{border-color:var(--gallery)}
  .card[data-cat=news]{border-color:var(--news)}
  .card[data-cat=skip]{opacity:.45;border-color:var(--skip)}
  .card .thumb{flex:1;background:#000 center/cover no-repeat;position:relative;min-height:0}
  .card .thumb video{width:100%;height:100%;object-fit:cover;display:block}
  .card .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .card .badges{position:absolute;top:6px;left:6px;right:6px;display:flex;gap:4px;justify-content:space-between}
  .badge{background:rgba(0,0,0,.6);color:#fff;padding:2px 7px;border-radius:3px;font-size:.7rem;letter-spacing:.04em;text-transform:uppercase}
  .badge.video{background:rgba(230,163,58,.85);color:#000}
  .badge.cat{background:rgba(0,0,0,.75)}
  .badge.cat.hero{background:var(--hero);color:#fff}
  .badge.cat.gallery{background:var(--gallery);color:#fff}
  .badge.cat.news{background:var(--news);color:#000}
  .badge.cat.skip{background:var(--skip);color:#fff}
  .meta{padding:.5rem .6rem;font-size:.78rem}
  .meta .date{color:var(--ink-soft);font-family:monospace}
  .meta .cap{color:var(--ink);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-top:3px;min-height:2.4em}

  /* modal */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center;padding:1rem}
  .modal.open{display:flex}
  .modal-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;max-width:1100px;width:100%;max-height:95vh;display:grid;grid-template-columns:1.2fr 1fr;overflow:hidden}
  .modal-media{background:#000;display:flex;align-items:center;justify-content:center;min-height:0;overflow:hidden}
  .modal-media video,.modal-media img{max-width:100%;max-height:95vh;object-fit:contain;display:block}
  .modal-side{padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:.75rem;overflow-y:auto;max-height:95vh}
  .modal-side h2{font-size:1rem;font-weight:700}
  .modal-side .date{color:var(--ink-soft);font-family:monospace;font-size:.8rem}
  .modal-side .caption{white-space:pre-wrap;color:var(--ink);line-height:1.55;font-size:.92rem;flex:1}
  .modal-side .cat-row{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:auto;padding-top:1rem;border-top:1px solid var(--border)}
  .modal-side .actions{display:flex;gap:.4rem;flex-wrap:wrap}
  .key{background:var(--panel-2);padding:1px 6px;border-radius:3px;font-family:monospace;font-size:.75rem;color:var(--ink-soft);margin-left:4px}
  .nav-arrows{position:fixed;top:50%;transform:translateY(-50%);font-size:2.2rem;color:rgba(255,255,255,.6);padding:.5rem 1rem;cursor:pointer;user-select:none;z-index:101}
  .nav-arrows:hover{color:#fff}
  .nav-arrows.prev{left:0} .nav-arrows.next{right:0}
  .close-x{position:absolute;top:10px;right:14px;background:rgba(0,0,0,.6);color:#fff;border:0;width:32px;height:32px;border-radius:50%;font-size:1.1rem;cursor:pointer;z-index:102}

  .hint{font-size:.78rem;color:var(--ink-soft);margin-top:.5rem;border-top:1px solid var(--border);padding-top:.5rem}
  .hint code{background:var(--panel-2);padding:1px 5px;border-radius:3px;font-size:.75rem}

  .empty{grid-column:1/-1;text-align:center;padding:3rem;color:var(--ink-soft)}

  @media (max-width:800px){
    .modal-card{grid-template-columns:1fr;max-height:95vh}
    .modal-media{max-height:50vh}
  }
</style>
</head>
<body>

<header>
  <h1>media picker <span id="stats">…</span></h1>
  <div class="sep"></div>
  <input type="text" id="search" placeholder="search captions…">
  <div class="sep"></div>
  <button class="chip" data-type="all">all</button>
  <button class="chip" data-type="photo">photo</button>
  <button class="chip" data-type="video">video</button>
  <div class="sep"></div>
  <button class="chip" data-cat="all">all</button>
  <button class="chip" data-cat="unsorted">unsorted</button>
  <button class="chip" data-cat="hero"><span class="dot hero"></span>hero</button>
  <button class="chip" data-cat="gallery"><span class="dot gallery"></span>gallery</button>
  <button class="chip" data-cat="news"><span class="dot news"></span>news</button>
  <button class="chip" data-cat="skip"><span class="dot skip"></span>skip</button>
  <div class="counter" id="counter">…</div>
  <button class="btn" id="exportBtn">export json ↓</button>
  <button class="btn" id="clearBtn" title="clear all selections">reset</button>
</header>

<main id="grid"></main>

<div class="modal" id="modal">
  <div class="nav-arrows prev" id="prev">‹</div>
  <div class="nav-arrows next" id="next">›</div>
  <div class="modal-card">
    <div class="modal-media" id="modalMedia"></div>
    <div class="modal-side">
      <button class="close-x" id="closeX">×</button>
      <h2 id="mDate">…</h2>
      <div class="actions">
        <a id="mIGLink" href="#" target="_blank">view on IG →</a>
      </div>
      <div class="caption" id="mCaption"></div>
      <div class="cat-row">
        <button class="chip" data-setcat="hero"><span class="dot hero"></span>hero <span class="key">1</span></button>
        <button class="chip" data-setcat="gallery"><span class="dot gallery"></span>gallery <span class="key">2</span></button>
        <button class="chip" data-setcat="news"><span class="dot news"></span>news <span class="key">3</span></button>
        <button class="chip" data-setcat="skip"><span class="dot skip"></span>skip <span class="key">4</span></button>
        <button class="chip" data-setcat="">clear <span class="key">0</span></button>
      </div>
      <div class="hint">
        keys: <code>←/→</code> navigate · <code>1-4</code> tag · <code>0</code> clear · <code>esc</code> close · <code>/</code> search
      </div>
    </div>
  </div>
</div>

<script>
const LS_KEY = 'samwatts-picks-v1';
let items = [];
let picks = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
let filtered = [];
let openIdx = -1;
let filterType = 'all';
let filterCat  = 'all';
let searchQ    = '';

const $ = s => document.querySelector(s);
const grid = $('#grid');

async function load() {
  const res = await fetch('index.json');
  items = await res.json();
  $('#stats').textContent = `· ${items.length} posts`;
  applyFilters();
  updateCounter();
  wireChips();
  wireModal();
}

function applyFilters(){
  const q = searchQ.toLowerCase().trim();
  filtered = items.filter(it => {
    if (filterType !== 'all' && it.type !== filterType) return false;
    const cat = picks[it.id] || '';
    if (filterCat === 'unsorted' && cat) return false;
    if (filterCat !== 'all' && filterCat !== 'unsorted' && cat !== filterCat) return false;
    if (q && !(it.caption || '').toLowerCase().includes(q)) return false;
    return true;
  });
  render();
}

function render(){
  if (!filtered.length){ grid.innerHTML='<div class="empty">no matches</div>'; return; }
  const frag = document.createDocumentFragment();
  filtered.forEach((it, i) => {
    const card = document.createElement('div');
    const cat = picks[it.id] || '';
    card.className = 'card';
    if (cat) card.dataset.cat = cat;
    card.dataset.idx = i;

    const thumb = document.createElement('div');
    thumb.className = 'thumb';
    if (it.thumb){
      const img = document.createElement('img');
      img.loading = 'lazy';
      img.src = it.thumb;
      thumb.appendChild(img);
    }
    card.appendChild(thumb);

    const badges = document.createElement('div');
    badges.className = 'badges';
    const left = document.createElement('span');
    left.className = 'badge' + (it.type==='video'?' video':'');
    left.textContent = it.type;
    badges.appendChild(left);
    if (cat){
      const right = document.createElement('span');
      right.className = 'badge cat ' + cat;
      right.textContent = cat;
      badges.appendChild(right);
    }
    thumb.appendChild(badges);

    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.innerHTML = `<div class="date">${it.date}</div><div class="cap">${escapeHtml((it.caption||'').slice(0,140))}</div>`;
    card.appendChild(meta);

    card.onclick = () => openModal(i);
    frag.appendChild(card);
  });
  grid.innerHTML = '';
  grid.appendChild(frag);
}

function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function wireChips(){
  document.querySelectorAll('header .chip[data-type]').forEach(b => {
    b.onclick = () => { filterType = b.dataset.type; updateChipState('data-type', filterType); applyFilters(); };
  });
  document.querySelectorAll('header .chip[data-cat]').forEach(b => {
    b.onclick = () => { filterCat = b.dataset.cat; updateChipState('data-cat', filterCat); applyFilters(); };
  });
  // defaults
  document.querySelector('header .chip[data-type="all"]').classList.add('active');
  document.querySelector('header .chip[data-cat="all"]').classList.add('active');

  $('#search').addEventListener('input', e => { searchQ = e.target.value; applyFilters(); });
  $('#exportBtn').onclick = exportJSON;
  $('#clearBtn').onclick = () => {
    if (confirm('wipe all selections?')){ picks = {}; localStorage.setItem(LS_KEY, '{}'); applyFilters(); updateCounter(); }
  };
}

function updateChipState(attr, val){
  document.querySelectorAll(`header .chip[${attr}]`).forEach(b => {
    b.classList.toggle('active', b.getAttribute(attr) === val);
  });
}

function updateCounter(){
  const c = { hero:0, gallery:0, news:0, skip:0 };
  Object.values(picks).forEach(v => c[v] !== undefined && c[v]++);
  $('#counter').innerHTML = `<span class="dot hero"></span>${c.hero} <span class="dot gallery" style="margin-left:8px"></span>${c.gallery} <span class="dot news" style="margin-left:8px"></span>${c.news} <span class="dot skip" style="margin-left:8px"></span>${c.skip}`;
}

function openModal(i){
  openIdx = i;
  const it = filtered[i];
  if (!it) return;
  $('#modal').classList.add('open');
  $('#mDate').textContent = `${it.date} ${it.time}  ·  ${it.type}`;
  $('#mCaption').textContent = it.caption || '(no caption)';
  $('#mIGLink').href = it.url;

  const mm = $('#modalMedia'); mm.innerHTML = '';
  if (it.videos && it.videos.length){
    const v = document.createElement('video');
    v.src = it.videos[0];
    v.controls = true;
    v.autoplay = true;
    v.loop = true;
    mm.appendChild(v);
  } else if (it.images && it.images.length){
    const img = document.createElement('img');
    img.src = it.images[0];
    mm.appendChild(img);
  }

  // mark current category in modal chips
  document.querySelectorAll('.cat-row .chip').forEach(c => {
    c.classList.toggle('active', (picks[it.id]||'') === c.dataset.setcat);
  });
}

function closeModal(){
  $('#modal').classList.remove('open');
  $('#modalMedia').innerHTML = '';
  openIdx = -1;
}

function setCat(cat){
  if (openIdx < 0) return;
  const it = filtered[openIdx];
  if (!it) return;
  if (cat) picks[it.id] = cat; else delete picks[it.id];
  localStorage.setItem(LS_KEY, JSON.stringify(picks));
  updateCounter();
  // update card in place
  const card = grid.querySelector(`.card[data-idx="${openIdx}"]`);
  if (card){
    if (cat) card.dataset.cat = cat; else delete card.dataset.cat;
    const catBadge = card.querySelector('.badge.cat');
    if (catBadge) catBadge.remove();
    if (cat){
      const b = document.createElement('span');
      b.className = 'badge cat ' + cat;
      b.textContent = cat;
      card.querySelector('.badges').appendChild(b);
    }
  }
  document.querySelectorAll('.cat-row .chip').forEach(c => {
    c.classList.toggle('active', (picks[it.id]||'') === c.dataset.setcat);
  });
}

function wireModal(){
  $('#closeX').onclick = closeModal;
  $('#modal').onclick = e => { if (e.target.id === 'modal') closeModal(); };
  $('#prev').onclick = () => nav(-1);
  $('#next').onclick = () => nav(1);
  document.querySelectorAll('.cat-row .chip').forEach(c => c.onclick = () => setCat(c.dataset.setcat));
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') {
      if (e.key === 'Escape') e.target.blur();
      return;
    }
    if (e.key === '/') { e.preventDefault(); $('#search').focus(); return; }
    if (!$('#modal').classList.contains('open')) return;
    if (e.key === 'Escape') closeModal();
    if (e.key === 'ArrowLeft') nav(-1);
    if (e.key === 'ArrowRight') nav(1);
    const map = {'1':'hero','2':'gallery','3':'news','4':'skip','0':''};
    if (e.key in map) setCat(map[e.key]);
  });
}

function nav(d){
  const i = openIdx + d;
  if (i < 0 || i >= filtered.length) return;
  openModal(i);
}

function exportJSON(){
  const out = {};
  ['hero','gallery','news','skip'].forEach(c => out[c] = []);
  items.forEach(it => {
    const c = picks[it.id];
    if (!c) return;
    out[c].push({ id:it.id, date:it.date, type:it.type, thumb:it.thumb, videos:it.videos, images:it.images, caption:it.caption, url:it.url });
  });
  const blob = new Blob([JSON.stringify(out, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `samwatts-picks-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

load();
</script>
</body>
</html>
