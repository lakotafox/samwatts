<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Texture picker — samwatts</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&family=Fraunces:opsz,wght@9..144,400..700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
:root {
  --parchment: #f4e8d0;
  --ink: #1c1410;
  --ink-soft: #3a2817;
  --oxblood: #8b2f1f;
  --brass: #b8763a;
  --paper: #fbf4df;
  --border: #bba77d;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font:400 14px/1.5 'Fraunces',Georgia,serif;background:#2a211a;color:#e6d8b5}
a{color:var(--brass)}

header{position:sticky;top:0;z-index:10;background:#1c1410;border-bottom:1px solid #3a2817;padding:.75rem 1.25rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
header h1{font:400 1.1rem/1 'IM Fell English SC',serif;letter-spacing:.03em}
header .tabs{display:flex;gap:.3rem;margin-left:auto;flex-wrap:wrap}
.tab{background:#3a2817;color:#e6d8b5;border:1px solid #5a4530;padding:.35rem .8rem;border-radius:3px;cursor:pointer;font:600 .78rem/1 'Fraunces',serif;letter-spacing:.04em;text-transform:uppercase}
.tab.active{background:var(--oxblood);color:var(--parchment);border-color:var(--oxblood)}
.tab:hover:not(.active){background:#4a3420}

/* LIVE PREVIEW */
.preview{
  margin:1.25rem;
  background:var(--parchment);
  border-radius:4px;
  padding:3rem 2rem;
  position:relative;
  overflow:hidden;
  min-height:320px;
  box-shadow:0 20px 50px rgba(0,0,0,.4), 0 4px 10px rgba(0,0,0,.3);
}
.preview .inner{position:relative;z-index:3;max-width:560px;margin:0 auto;text-align:center;color:var(--ink)}
.preview .eyebrow{font:400 .82rem/1 'Special Elite',mono;color:var(--oxblood);text-transform:uppercase;letter-spacing:.14em;margin-bottom:.75rem}
.preview h2{font:400 clamp(2rem,4.5vw,3rem)/1.05 'IM Fell English SC',serif;color:var(--ink);margin-bottom:.75rem}
.preview p{font-size:1.05rem;color:var(--ink-soft)}
.preview-layer{position:absolute;inset:0;pointer-events:none}
.preview-layer.tile{background-size:auto;background-repeat:repeat;z-index:1}
.preview-layer.photo{background-size:cover;background-position:center;mix-blend-mode:multiply;opacity:.55;z-index:1}
.preview-layer.wrinkle{background-size:cover;background-position:center;mix-blend-mode:multiply;opacity:.45;z-index:2}
.preview-layer.burn{background-size:cover;background-position:center;mix-blend-mode:multiply;opacity:.7;z-index:2}
.preview-layer.stain{position:absolute;width:220px;height:180px;background-size:contain;background-repeat:no-repeat;background-position:center;mix-blend-mode:multiply;opacity:.6;z-index:2}
.preview-layer.stain.s1{left:-4%;top:12%;transform:rotate(-12deg) scale(1)}
.preview-layer.stain.s2{right:-3%;bottom:8%;transform:rotate(22deg) scale(.8)}

/* SELECTION BAR */
.picks{margin:0 1.25rem 1rem;display:flex;gap:.6rem;flex-wrap:wrap;font:600 .78rem/1.2 'Fraunces',serif}
.pick{background:#3a2817;border:1px solid #5a4530;padding:.4rem .7rem;border-radius:3px;display:inline-flex;align-items:center;gap:.4rem}
.pick .label{color:#a89974;font-weight:400;text-transform:uppercase;letter-spacing:.08em;font-size:.68rem}
.pick .val{color:#e6d8b5}
.pick button{background:#6b2218;color:#e6d8b5;border:0;padding:2px 7px;border-radius:2px;font:600 .7rem/1 inherit;cursor:pointer;margin-left:.3rem}
.pick button:hover{background:#8b2f1f}

/* GRID */
main{padding:0 1.25rem 3rem}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.85rem}
.tile{background:#1c1410;border:2px solid #3a2817;border-radius:4px;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s}
.tile:hover{border-color:#6b4e2a;transform:translateY(-2px)}
.tile.selected{border-color:var(--brass);box-shadow:0 0 0 3px rgba(184,118,58,.25)}
.tile .swatch{aspect-ratio:4/3;background-color:var(--parchment);background-position:center;position:relative;overflow:hidden}
.tile .swatch.tile-bg{background-repeat:repeat;background-size:auto}
.tile .swatch.cover-bg{background-size:cover;background-repeat:no-repeat}
.tile .swatch.overlay-bg{background-color:#f4e8d0;background-size:cover;background-repeat:no-repeat}
.tile .name{padding:.4rem .55rem;font:400 .78rem/1.2 'Special Elite',mono;color:#a89974;display:flex;justify-content:space-between;gap:.5rem}
.tile .name span.size{color:#6b5432;font-size:.7rem}

.empty{grid-column:1/-1;padding:3rem;text-align:center;color:#8c7b56}

.view{display:none}
.view.active{display:block}

/* EXPORT */
.actions{margin:1.25rem;display:flex;gap:.5rem;align-items:center}
.btn{background:var(--oxblood);color:var(--parchment);border:0;padding:.65rem 1.1rem;border-radius:3px;font:700 .82rem/1 'Fraunces',serif;letter-spacing:.04em;text-transform:uppercase;cursor:pointer}
.btn:hover{background:#5f1f14}
.btn.secondary{background:#3a2817}
.btn.secondary:hover{background:#4a3420}
.hint{font-size:.8rem;color:#a89974}

@media (max-width:720px){
  header{padding:.5rem .75rem}
  header h1{font-size:.95rem}
  .tab{padding:.3rem .6rem;font-size:.7rem}
  .preview{margin:.75rem}
  .preview h2{font-size:1.6rem}
  main{padding:0 .75rem 3rem}
  .gallery{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.6rem}
}
</style>
</head>
<body>

<header>
  <h1>texture picker</h1>
  <div class="tabs">
    <button class="tab active" data-view="parchment-tile">tiled parchments</button>
    <button class="tab" data-view="parchment-photo">parchment photos</button>
    <button class="tab" data-view="stain">coffee stains</button>
    <button class="tab" data-view="wrinkle">wrinkles</button>
    <button class="tab" data-view="burn">burn marks</button>
  </div>
</header>

<!-- live preview using current picks -->
<div class="preview" id="preview">
  <div class="preview-layer tile" id="layerTile"></div>
  <div class="preview-layer photo" id="layerPhoto"></div>
  <div class="preview-layer wrinkle" id="layerWrinkle"></div>
  <div class="preview-layer burn" id="layerBurn"></div>
  <div class="preview-layer stain s1" id="layerStain1"></div>
  <div class="preview-layer stain s2" id="layerStain2"></div>
  <div class="inner">
    <p class="eyebrow">— take the pledge. join the m8s.</p>
    <h2>You know that guy.</h2>
    <p>The one who just shows up. Lifts. Prays. Shows up again.</p>
  </div>
</div>

<div class="picks" id="picks"></div>

<div class="actions">
  <button class="btn" id="copyBtn">copy picks as json</button>
  <button class="btn secondary" id="clearBtn">clear all</button>
  <span class="hint">picks persist in localStorage. tell me the filenames you chose.</span>
</div>

<main>
  <section class="view active" id="view-parchment-tile">
    <div class="gallery" id="grid-parchment-tile"></div>
  </section>
  <section class="view" id="view-parchment-photo">
    <div class="gallery" id="grid-parchment-photo"></div>
  </section>
  <section class="view" id="view-stain">
    <div class="gallery" id="grid-stain"></div>
  </section>
  <section class="view" id="view-wrinkle">
    <div class="gallery" id="grid-wrinkle"></div>
  </section>
  <section class="view" id="view-burn">
    <div class="gallery" id="grid-burn"></div>
  </section>
</main>

<script>
const LS = 'samwatts-textures-v1';
const picks = JSON.parse(localStorage.getItem(LS) || '{}');
const $ = s => document.querySelector(s);

const FILES = ["burn-1.png", "burn-2.png", "burn-3.png", "burn-4.png", "burn-5.png", "burn-6.jpg", "parchment-cardboard.png", "parchment-cream-paper.png", "parchment-groovepaper.png", "parchment-light-paper-fibers.png", "parchment-natural-paper.png", "parchment-old-map.png", "parchment-old-mathematics.png", "parchment-paper-fibers.png", "parchment-photo-1.jpg", "parchment-photo-2.jpg", "parchment-photo-3.jpg", "parchment-photo-4.jpg", "parchment-photo-5.jpg", "parchment-rice-paper-2.png", "parchment-rice-paper.png", "parchment-textured-paper.png", "parchment-worn-dots.png", "stain-1.png", "stain-2.png", "stain-3.png", "stain-4.png", "stain-5.png", "stain-6.png", "wrinkle-1.png", "wrinkle-2.png", "wrinkle-3.png", "wrinkle-4.png", "wrinkle-5.png", "wrinkle-6.png", "wrinkle-7.jpg", "wrinkle-8.jpg"];

// group files
const groups = {
  'parchment-tile':  FILES.filter(f => f.startsWith('parchment-') && !f.startsWith('parchment-photo')),
  'parchment-photo': FILES.filter(f => f.startsWith('parchment-photo')),
  'stain':           FILES.filter(f => f.startsWith('stain-')),
  'wrinkle':         FILES.filter(f => f.startsWith('wrinkle-')),
  'burn':            FILES.filter(f => f.startsWith('burn-')),
};

// picks shape: { base: filename|null, photo: filename|null, stain1: f, stain2: f, wrinkle: f, burn: f }
function save(){ localStorage.setItem(LS, JSON.stringify(picks)); }

function renderGrid(view){
  const grid = document.getElementById('grid-'+view);
  if (!grid) return;
  grid.innerHTML = '';
  const files = groups[view] || [];
  if (!files.length){ grid.innerHTML = '<div class="empty">no files in this category yet</div>'; return; }
  files.forEach(f => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.dataset.file = f;

    const swatch = document.createElement('div');
    swatch.className = 'swatch ' + (view === 'parchment-tile' ? 'tile-bg' : view === 'parchment-photo' ? 'cover-bg' : 'overlay-bg');
    swatch.style.backgroundImage = `url("/assets/textures/${f}")`;
    tile.appendChild(swatch);

    const name = document.createElement('div');
    name.className = 'name';
    name.innerHTML = `<span>${f}</span>`;
    tile.appendChild(name);

    tile.addEventListener('click', () => pick(view, f));
    grid.appendChild(tile);
  });
  markSelected(view);
}

function pick(view, f){
  // stains support 2 slots; click toggles
  if (view === 'stain') {
    if (picks.stain1 === f) { delete picks.stain1; }
    else if (picks.stain2 === f) { delete picks.stain2; }
    else if (!picks.stain1) { picks.stain1 = f; }
    else if (!picks.stain2) { picks.stain2 = f; }
    else { picks.stain1 = f; } // cycle
  } else {
    const key = ({ 'parchment-tile':'base', 'parchment-photo':'photo', 'wrinkle':'wrinkle', 'burn':'burn' })[view];
    picks[key] = picks[key] === f ? null : f;
    if (picks[key] === null) delete picks[key];
  }
  save();
  applyPreview();
  markSelected(view);
  renderPicks();
}

function markSelected(view){
  const grid = document.getElementById('grid-'+view);
  if (!grid) return;
  grid.querySelectorAll('.tile').forEach(t => {
    const f = t.dataset.file;
    const selected = [picks.base, picks.photo, picks.stain1, picks.stain2, picks.wrinkle, picks.burn].includes(f);
    t.classList.toggle('selected', selected);
  });
}

function applyPreview(){
  const url = f => f ? `url("/assets/textures/${f}")` : 'none';
  $('#layerTile').style.backgroundImage    = url(picks.base);
  $('#layerPhoto').style.backgroundImage   = url(picks.photo);
  $('#layerWrinkle').style.backgroundImage = url(picks.wrinkle);
  $('#layerBurn').style.backgroundImage    = url(picks.burn);
  $('#layerStain1').style.backgroundImage  = url(picks.stain1);
  $('#layerStain2').style.backgroundImage  = url(picks.stain2);
}

function renderPicks(){
  const bar = $('#picks'); bar.innerHTML = '';
  const labels = { base:'base', photo:'photo', stain1:'stain 1', stain2:'stain 2', wrinkle:'wrinkle', burn:'burn' };
  ['base','photo','wrinkle','burn','stain1','stain2'].forEach(k => {
    if (!picks[k]) return;
    const p = document.createElement('span');
    p.className = 'pick';
    p.innerHTML = `<span class="label">${labels[k]}</span><span class="val">${picks[k]}</span><button data-rm="${k}">×</button>`;
    bar.appendChild(p);
  });
  bar.querySelectorAll('button[data-rm]').forEach(b => b.onclick = () => {
    delete picks[b.dataset.rm]; save(); applyPreview();
    Object.keys(groups).forEach(g => markSelected(g));
    renderPicks();
  });
  if (!bar.children.length) bar.innerHTML = '<span class="hint">— no picks yet. click a texture below —</span>';
}

// tabs
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('view-'+t.dataset.view).classList.add('active');
}));

// copy + clear
$('#copyBtn').onclick = async () => {
  const json = JSON.stringify(picks, null, 2);
  try { await navigator.clipboard.writeText(json); $('#copyBtn').textContent = 'copied! ✓'; setTimeout(() => $('#copyBtn').textContent = 'copy picks as json', 1500); }
  catch { alert(json); }
};
$('#clearBtn').onclick = () => { if (confirm('clear all picks?')) { Object.keys(picks).forEach(k => delete picks[k]); save(); applyPreview(); Object.keys(groups).forEach(g => markSelected(g)); renderPicks(); }};

// init
Object.keys(groups).forEach(renderGrid);
applyPreview();
renderPicks();
</script>
</body>
</html>
